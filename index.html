<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ Travel Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 600px; width: 90%; }
  h1 { text-align: center; font-size: 2em; margin-bottom: 24px; }
  .cards { display: flex; flex-direction: column; gap: 16px; }
  a.card { display: block; background: white; border-radius: 12px; padding: 20px 24px; text-decoration: none; color: #333; border: 1px solid #e0e0e0; transition: all 0.2s; }
  a.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .card .emoji { font-size: 1.5em; margin-right: 12px; }
  .card .title { font-weight: 600; font-size: 1.1em; }
  .card .desc { font-size: 0.85em; color: #888; margin-top: 4px; }
  .section { font-size: 0.8em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 8px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <h1>✈️ Travel Hub</h1>
  <div class="section">🔧 工具</div>
  <div class="cards">
    <a class="card" href="planner/holiday-planner.html">
      <span class="emoji">🗓️</span><span class="title">双城假期匹配器</span>
      <div class="desc">匹配两地假期窗口，智能规划请假方案</div>
    </a>
  </div>
  <div class="section">🌏 旅行计划</div>
  <div class="cards">
    <a class="card" href="jeju-2026/index.html">
      <span class="emoji">🇰🇷</span><span class="title">济州岛 2026</span>
      <div class="desc">Jeju Island trip plan</div>
    </a>
    <a class="card" href="malaysia-2026/index.html">
      <span class="emoji">🇲🇾</span><span class="title">马来西亚 2026</span>
      <div class="desc">Malaysia trip plan</div>
    </a>
  </div>
</div>
</body>
</html>
